# Kitty
# Kitty calls panes "windows" and tmux-style windows "tabs".

# Appearance
include                     nord.conf
font_family                 MesloLGS NF
font_size                   13.0
hide_window_decorations     no
macos_titlebar_color        background
macos_show_window_title_in  none

# Window behaviour
confirm_os_window_close     0
copy_on_select              yes
enabled_layouts            splits,stack

# Remote control
allow_remote_control        socket-only
listen_on                   unix:kitty-{kitty_pid}

# Tabs
tab_title_template          "{index}: {activity_symbol}{'↗ ' if layout_name == 'stack' and num_window_groups > 1 else ''}{bell_symbol}{secure_input_symbol}{title}"
tab_activity_symbol         "• "
active_tab_font_style       bold
tab_bar_edge                bottom
tab_bar_style               powerline
tab_bar_min_tabs            1
tab_bar_margin_width        10.0
tab_bar_margin_height       10.0 10.0

# Scrollback
scrollback_lines            100000
scrollback_pager            /opt/homebrew/bin/nvim -u ~/.config/kitty/scrollback.lua -

# One-shot tmux-style leaders
map --new-mode tmux --on-action end §
map ctrl+b push_keyboard_mode tmux
map --mode tmux esc pop_keyboard_mode

# Panes
map --mode tmux backslash  launch --location=vsplit --cwd=current
map --mode tmux bar        launch --location=vsplit --cwd=current
map --mode tmux minus      launch --location=hsplit --cwd=current
map --mode tmux underscore launch --location=hsplit --cwd=current

map --mode tmux h neighboring_window left
map --mode tmux j neighboring_window down
map --mode tmux k neighboring_window up
map --mode tmux l neighboring_window right

map --mode tmux shift+h resize_window narrower
map --mode tmux shift+j resize_window shorter
map --mode tmux shift+k resize_window taller
map --mode tmux shift+l resize_window wider

# Repeating either leader returns to the previously active pane.
map --mode tmux §      nth_window -1
map --mode tmux ctrl+b nth_window -1

# Tabs
map --mode tmux c       new_tab_with_cwd
map --mode tmux shift+x close_tab
map --mode tmux w       focus_visible_window
map --mode tmux z       toggle_layout stack
map --mode tmux r       layout_action rotate

map --mode tmux 1 goto_tab 1
map --mode tmux 2 goto_tab 2
map --mode tmux 3 goto_tab 3
map --mode tmux 4 goto_tab 4
map --mode tmux 5 goto_tab 5
map --mode tmux 6 goto_tab 6
map --mode tmux 7 goto_tab 7
map --mode tmux 8 goto_tab 8
map --mode tmux 9 goto_tab 9
map --mode tmux 0 goto_tab 10

# Tools
map --mode tmux :       command_palette
map --mode tmux [       show_scrollback
map --mode tmux shift+p show_scrollback
map --mode tmux v       launch --type=overlay --cwd=current
map --mode tmux g       launch --type=overlay --cwd=current lazygit
map --mode tmux u       kitten hints --type url
map --mode tmux f       kitten hints --type path --program -
map --mode tmux y       launch --type=background --stdin-source=@last_cmd_output /usr/bin/pbcopy

# Direct tab switching
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10
