# Kitty configuration
#
# A tmux-free setup that keeps the tmux muscle memory. See tmux/.config/tmux/
# tmux.conf for the workflow this mirrors. Highlights:
#
#   - `§` is a one-shot, tmux-style prefix (Kitty has no leader by default).
#     Press `§` then a key, exactly like tmux prefix. It auto-exits after one
#     action (`--on-action end`).
#   - Copy mode = Neovim. `§ [` pipes the scrollback into a real nvim buffer,
#     so `v` / `y` / `/` / text objects all work. Strictly more than tmux's
#     copy-mode.
#   - Splits (tmux panes) and tabs (tmux windows) with `alt+<n>` to switch.
#
# Terminology: a Kitty "window" == a tmux pane; a Kitty "tab" == a tmux window.
#
# Validate with: kitty --debug-config

#
# Appearance
#
font_family      MesloLGS NF
font_size        13.0
include          nord.conf

# tmux: history-limit 100000
scrollback_lines 100000

# splits = tmux-style panes; stack = zoom (see `§ z` below)
enabled_layouts  splits,stack

# tmux: mouse on (Kitty enables mouse selection by default)
copy_on_select   yes

# Fewer confirmation prompts when closing a window with a running program
confirm_os_window_close 0

#
# Titles
#
# Kitty shell integration (on by default) sets the title to the running command
# / directory. Mirror tmux `automatic-rename-format '#{b:pane_current_path}'`.
tab_title_template        "{index}: {title}"
active_tab_font_style     bold
tab_bar_edge              bottom
tab_bar_style             powerline

#
# Copy mode (the priority): browse scrollback in Neovim.
#
# `§ [` mirrors tmux `prefix + [`. The scrollback opens in nvim where the full
# Vim visual/yank machinery is available; `y` yanks to the system clipboard via
# unnamedplus, `q` closes.
scrollback_pager nvim -u NONE -c "set nonumber nolist showtabline=0 foldcolumn=0" -c "autocmd TermOpen * normal G" -c "map q :qa!<CR>" -c "set clipboard+=unnamedplus" -c "silent write! /tmp/kitty_scrollback_buffer | te cat /tmp/kitty_scrollback_buffer -"

#
# Prefix: make `§` a one-shot tmux-style leader.
#
# After `§`, a single mapped key fires and the mode ends automatically.
# Press Escape to cancel. This preserves 10 years of tmux prefix muscle memory.
map --new-mode tmux --on-action end §
map --mode tmux esc pop_keyboard_mode

# --- Splits (tmux panes) ---
# tmux: \ vsplit, | full vsplit, - hsplit, _ full hsplit (all in current path)
map --mode tmux backslash launch --location=vsplit --cwd=current
map --mode tmux bar       launch --location=vsplit --cwd=current
map --mode tmux minus     launch --location=hsplit --cwd=current
map --mode tmux underscore launch --location=hsplit --cwd=current

# --- Pane navigation / resize (tmux-pain-control) ---
map --mode tmux h neighboring_window left
map --mode tmux j neighboring_window down
map --mode tmux k neighboring_window up
map --mode tmux l neighboring_window right
map --mode tmux shift+h resize_window narrower
map --mode tmux shift+j resize_window shorter
map --mode tmux shift+k resize_window taller
map --mode tmux shift+l resize_window wider

# tmux: C-b C-b (prefix twice) jumps between panes. Kitty has no true last-pane
# toggle, so `§ §` pops up a visual window picker (closest keyboard-only equiv).
map --mode tmux § focus_visible_window

# --- Windows/tabs ---
map --mode tmux c new_tab_with_cwd
map --mode tmux shift+x close_tab
map --mode tmux w focus_visible_window
map --mode tmux z toggle_layout stack
map --mode tmux r layout_action rotate

# --- Copy mode + capture ---
# tmux: prefix [ enters copy-mode; prefix P saves history. Both land in nvim,
# where `:w ~/kitty.history` saves the buffer.
map --mode tmux bracketleft show_scrollback
map --mode tmux shift+p     show_scrollback

# --- Popups (tmux display-popup) ---
# tmux: prefix v -> shell popup, prefix g -> lazygit popup
map --mode tmux v launch --type=overlay --cwd=current
map --mode tmux g launch --type=overlay --cwd=current lazygit

# --- Hints (replaces tmux-fzf-url `u` and tmux-fpp `f`) ---
map --mode tmux u kitten hints --type url
map --mode tmux f kitten hints --type path --program -

#
# Direct bindings (no prefix) — mirror tmux `M-<n>` window switching.
#
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10
