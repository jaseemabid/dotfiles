[[mgr.prepend_keymap]]
on = "?"
run = "help"
desc = "Open help"

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = "+"
run = "plugin zoom 1"
desc = "Zoom in hovered file"

[[mgr.prepend_keymap]]
on = "-"
run = "plugin zoom -1"
desc = "Zoom out hovered file"

[[mgr.prepend_keymap]]
on = "t"
run = "plugin toggle-pane min-preview"
desc = "Show or hide the preview pane"

[[mgr.prepend_keymap]]
on = ["g", "i"]
run = "plugin lazygit"
desc = "Run lazygit"

[[mgr.prepend_keymap]]
on = ["g", "r"]
run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "Go to git repository root"

[[mgr.prepend_keymap]]
on = ["g", "n"]
run = 'cd sftp://nyx/'
desc = "Go to nyx over SFTP"

[[mgr.prepend_keymap]]
on = ["g", "p"]
run = 'cd sftp://nyx//Plex'
desc = "Go to /Plex on nyx over SFTP"
